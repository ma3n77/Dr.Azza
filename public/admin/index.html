<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Azza Baraka - CMS</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
      :root {
        /* Override Sveltia CMS default theme colors to match Dr. Azza's brand */
        --sui-primary-accent-color: #001736;
        --sui-primary-accent-color-hover: #1a5cc8;
        --sui-secondary-accent-color: #1a5cc8;
        --sui-font-family-sans: "Outfit", sans-serif;
        --sui-font-family-serif: "Hanken Grotesk", sans-serif;
        --sui-border-radius: 0.5rem;
      }
      /* Add a subtle background color to the login screen */
      body {
        background-color: #f7f9fb;
      }
    </style>
  </head>
  <body>
    <!-- Sveltia CMS is a lightweight, modern drop-in replacement for Decap CMS -->
    <!-- It natively supports GitHub OAuth without needing a proxy server -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
