    <script type="text/javascript">
      // Single Page Apps for GitHub Pages

      (function(l) {
        if (l.search[1] === 'p') {
          var a = l.search.slice(1).split('&').map(function(s) { return s.replace(/~and~/g, '&') })
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + a[0].slice(2) +
            (a[1] ? '?' + a[1].slice(2) : '') +
            l.hash
          );
        }
      }(window.location))
    </script>
